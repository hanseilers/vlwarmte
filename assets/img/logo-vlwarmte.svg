<svg xmlns="http://www.w3.org/2000/svg" width="789" height="525" viewBox="0 0 789 525" role="img" aria-label="VLWarmte logo">
  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28" />
    </filter>
    <filter id="vibrance" x="-5%" y="-5%" width="110%" height="110%">
      <feColorMatrix
        type="matrix"
        values="
          1.08 0    0    0 0
          0    1.08 0    0 0
          0    0    1.08 0 0
          0    0    0    1 0"
      />
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <image href="source/asset_2.png" width="789" height="525" filter="url(#vibrance)" />
  </g>
</svg>
